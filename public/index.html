<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Multiplayer Game</title>
</head>
<body>

<h1>Multiplayer Game</h1>

<canvas id="game" width="600" height="400" style="border:1px solid black"></canvas>

<script src="/socket.io/socket.io.js"></script>
<script>
const socket = io();

const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

let players = {};
let myPos = { x: 100, y: 100 };

socket.on("playersUpdate", (data) => {
    players = data;
    draw();
});

function draw() {
    ctx.clearRect(0, 0, 600, 400);

    for (let id in players) {
        const p = players[id];

        ctx.fillStyle = p.color;
        ctx.fillRect(p.x, p.y, 20, 20);
    }
}

document.addEventListener("keydown", (e) => {
    const speed = 5;

    if (e.key === "w") myPos.y -= speed;
    if (e.key === "s") myPos.y += speed;
    if (e.key === "a") myPos.x -= speed;
    if (e.key === "d") myPos.x += speed;

    socket.emit("move", myPos);
});
</script>

</body>
</html>
